<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/styles.css">
  <title>Kirpputori</title>
</head>
<body>
  <main class="auth-page">
    <h1>Sign in</h1>
    <label>Username<br><input id="signinUsername" autocomplete="username"></label>
    <label>Password<br><input id="signinPassword" type="password" autocomplete="current-password"></label>
    <div class="auth-actions">
      <button id="signinBtn">Sign in</button>
      <a href="signup.html">Create account</a>
    </div>
    <div id="signinMessage" class="message"></div>
  </main>

  <script src="JS/auth.js"></script>
</body>
</html>
