<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Kirpputori</title>
</head>
<body>
    <main class="auth-page">
        <h1>Create account</h1>
        <label>Username<br><input id="username" autocomplete="username"></label>
        <label>Password<br><input id="password" type="password" autocomplete="new-password"></label>
        <label>Email<br><input id="email" type="email" autocomplete="email"></label>
        <div class="auth-actions">
            <button id="signupBtn">Sign up</button>
            <a href="index.html">Cancel</a>
        </div>
        <div id="signupMessage" class="message"></div>
    </main>

    <script src="JS/auth.js"></script>
</body>
</html>
